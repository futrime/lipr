on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  discover-packages:
    runs-on: ubuntu-latest
    concurrency:
      group: discover-packages
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - env:
          GH_TOKEN: ${{ github.token }}
          NPM_CONFIG_CACHE: /tmp/lipr-npm-cache
        run: python scripts/discover-packages.py
