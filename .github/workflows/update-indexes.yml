on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-indexes.yml
      - packages/**
      - scripts/generate-indexes.py

jobs:
  update-indexes:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - run: python scripts/generate-indexes.py

      - run: |
          if git diff --quiet -- index.json levilauncher.json; then
            echo "No index changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json levilauncher.json
          git commit -m "chore: update package indexes"
          git push origin HEAD:${{ github.ref_name }}
